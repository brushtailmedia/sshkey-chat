name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - run: go build ./...
      - name: Sleep Guard
        run: bash .github/scripts/check_test_sleeps.sh
      - name: Test (race)
        run: go test -race -count=1 -p 1 ./...
      - name: Test (short)
        run: go test -short -count=1 -p 1 ./...
      - name: Test (shuffle)
        run: go test -shuffle=on -count=1 -p 1 ./...
      - name: Coverage Guard
        run: bash .github/scripts/check_coverage.sh
      - run: go vet ./...
      # staticcheck: catches bug classes go vet misses. Added 2026-04-25
      # after the post-v0.2.1 audit found SA4006 (this value is never
      # used) on a tea.Cmd that was appended to a discarded accumulator
      # — the download goroutine silently never fired. Pinned to 2026.1
      # (the version Phase 21 F5 rebuilt against Go 1.26.2).
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
      - name: Staticcheck
        run: staticcheck ./...
