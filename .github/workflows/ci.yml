name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - run: go build ./...
      - name: Sleep Guard
        run: bash .github/scripts/check_test_sleeps.sh
      - name: Test (race)
        run: go test -race -count=1 -p 1 ./...
      - name: Test (short)
        run: go test -short -count=1 -p 1 ./...
      - name: Test (shuffle)
        run: go test -shuffle=on -count=1 -p 1 ./...
      - name: Coverage Guard
        run: bash .github/scripts/check_coverage.sh
      - run: go vet ./...
