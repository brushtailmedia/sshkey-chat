name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - name: Sleep Guard
        run: bash .github/scripts/check_test_sleeps.sh
      - name: Test (race)
        run: go test -race -count=1 -p 1 ./...
      - name: Test (short)
        run: go test -short -count=1 -p 1 ./...
      - name: Test (shuffle)
        run: go test -shuffle=on -count=1 -p 1 ./...
      - name: Coverage Guard
        run: bash .github/scripts/check_coverage.sh
      # staticcheck on the release path: blocks a tag push if any new
      # SA-class finding lands (SA4006 etc.). Added 2026-04-25 after
      # the post-v0.2.1 audit — see ci.yml for the rationale. Pinned
      # to the Phase 21 F5 baseline version.
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
      - name: Staticcheck
        run: staticcheck ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
