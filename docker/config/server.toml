[server]
port = 2222
bind = "0.0.0.0"
admins = ["admin"]

[messages]
max_body_size = "16KB"

[retention]
purge_days = 0

[sync]
window_messages = 200
window_days = 7
history_page_size = 100

[files]
max_file_size = "50MB"                  # increase with care — see grace_period below
max_avatar_size = "256KB"
allowed_avatar_types = ["image/png", "image/jpeg"]

[devices]
max_per_user = 10

[rate_limits]
messages_per_second = 5
uploads_per_minute = 60
connections_per_minute = 10
failed_auth_per_minute = 5
typing_per_second = 1
history_per_minute = 50

[shutdown]
grace_period = "10s"                    # time to finish in-flight transfers on shutdown
                                        # if you increase max_file_size, increase this too
                                        # rule of thumb: max_file_size / 10 MB/s = minimum grace

[logging]
level = "info"
file = "/var/sshkey-chat/server.log"
max_size_mb = 100
max_files = 5
format = "json"

[push.apns]
enabled = false

[push.fcm]
enabled = false
